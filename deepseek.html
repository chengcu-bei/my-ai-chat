<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DeepSeek 智能助手</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #4a90e2;
            color: white;
            padding: 16px;
            text-align: center;
            font-size: 18px;
            font-weight: 500;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header small {
            font-size: 12px;
            opacity: 0.8;
            display: block;
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 20px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .user-message {
            background: #4a90e2;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .assistant-message {
            background: white;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .loading {
            background: white;
            color: #666;
            align-self: flex-start;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 14px;
        }
        .loading::after {
            content: "···";
            animation: dots 1.5s steps(4, end) infinite;
            display: inline-block;
            width: 20px;
            text-align: left;
        }
        @keyframes dots {
            0%, 20% { content: "·"; }
            40% { content: "··"; }
            60%, 100% { content: "···"; }
        }
        .input-container {
            background: white;
            padding: 12px 16px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .input-container input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
        }
        .input-container input:focus {
            border-color: #4a90e2;
        }
        .input-container button {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
        }
        .input-container button:disabled {
            background: #ccc;
        }
        .settings-panel {
            background: white;
            padding: 12px 16px;
            border-bottom: 1px solid #eee;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .settings-panel input {
            flex: 2;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 12px;
        }
        .settings-panel button {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }
        .settings-panel .api-status {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 12px;
        }
        .status-ok {
            background: #4caf50;
            color: white;
        }
        .status-error {
            background: #f44336;
            color: white;
        }
        .api-note {
            font-size: 11px;
            color: #999;
            margin-left: auto;
        }
    </style>
</head>
<body>

<div class="header">
    DeepSeek 智能助手
    <small>V4 Flash · 文字游戏/对话</small>
</div>

<div class="settings-panel">
    <input type="password" id="apiKeyInput" placeholder="DeepSeek API Key (sk-xxx)" style="flex:3">
    <input type="text" id="apiUrlInput" placeholder="API地址" value="https://api.deepseek.com/v1" style="flex:2">
    <button id="saveApiBtn">保存设置</button>
    <span id="apiStatus" class="api-status status-error">未设置</span>
    <span class="api-note">⚠️ Key仅存本地，不会上传</span>
</div>

<div class="chat-container" id="chatContainer">
    <div class="message assistant-message">
         你好！我是DeepSeek智能助手。<br>
        请在上方填入你的API Key开始使用。<br>
        支持文字游戏、问答、创作等场景。
    </div>
</div>

<div class="input-container">
    <input type="text" id="messageInput" placeholder="输入消息..." disabled>
    <button id="sendBtn" disabled>发送</button>
</div>

<script>
    const chatContainer = document.getElementById('chatContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const apiUrlInput = document.getElementById('apiUrlInput');
    const saveApiBtn = document.getElementById('saveApiBtn');
    const apiStatus = document.getElementById('apiStatus');

    let apiKey = localStorage.getItem('deepseek_api_key') || '';
    let apiUrl = localStorage.getItem('deepseek_api_url') || 'https://api.deepseek.com/v1';
    let conversationHistory = [];

    function init() {
        if (apiKey) {
            apiKeyInput.value = apiKey;
            updateApiStatus(true);
            enableChat(true);
        } else {
            apiKeyInput.value = '';
            updateApiStatus(false);
            enableChat(false);
        }
        apiUrlInput.value = apiUrl;
        loadHistoryFromStorage();
    }

    function saveApiSettings() {
        const newKey = apiKeyInput.value.trim();
        const newUrl = apiUrlInput.value.trim();
        
        if (newKey) {
            apiKey = newKey;
            apiUrl = newUrl || 'https://api.deepseek.com/v1';
            localStorage.setItem('deepseek_api_key', apiKey);
            localStorage.setItem('deepseek_api_url', apiUrl);
            updateApiStatus(true);
            enableChat(true);
            addMessage('system', '✅ API Key已保存，可以开始对话了！', 'assistant');
        } else {
            alert('请填写有效的API Key');
        }
    }

        if (valid) {

            apiStatus.className = 'api-status statu
